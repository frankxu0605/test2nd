<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄金分期管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css?v=113">
</head>
<body>
    <!-- Login Page -->
    <div id="login-page" class="login-container">
        <!-- Left: Showcase -->
        <div class="login-showcase">
            <div class="login-showcase-inner">
                <div class="showcase-logo">Au</div>
                <h1 class="showcase-title">黄金分期管理系统</h1>
                <p class="showcase-desc">专业的一站式黄金分期业务管理平台</p>
                <div class="showcase-features">
                    <div class="showcase-feat"><div class="feat-icon">&#128100;</div><span>客户管理</span></div>
                    <div class="showcase-feat"><div class="feat-icon">&#128203;</div><span>订单跟踪</span></div>
                    <div class="showcase-feat"><div class="feat-icon">&#128176;</div><span>还款计划</span></div>
                    <div class="showcase-feat"><div class="feat-icon">&#128230;</div><span>仓库库存</span></div>
                    <div class="showcase-feat"><div class="feat-icon">&#128200;</div><span>财务报表</span></div>
                    <div class="showcase-feat"><div class="feat-icon">&#128276;</div><span>逾期预警</span></div>
                </div>
                <div class="showcase-prices">
                    <div class="showcase-price-item">
                        <span class="sp-label">月付</span>
                        <span class="sp-val">¥99</span>
                        <span class="sp-unit">/月</span>
                    </div>
                    <div class="showcase-price-divider"></div>
                    <div class="showcase-price-item">
                        <span class="sp-label sp-hot">年付 · 推荐</span>
                        <span class="sp-val">¥999</span>
                        <span class="sp-unit">/年</span>
                    </div>
                </div>
                <p class="showcase-trial">注册即享 <strong>7天免费试用</strong>，全功能体验</p>
            </div>
            <!-- Decorative gold bars -->
            <div class="showcase-deco d1"></div>
            <div class="showcase-deco d2"></div>
            <div class="showcase-deco d3"></div>
        </div>

        <!-- Right: Form -->
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">Au</div>
                <h1>黄金分期管理系统</h1>
                <p id="login-subtitle">请登录您的账户</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" onsubmit="return false;">
                <div class="form-group">
                    <label>公司名称</label>
                    <input type="text" id="login-company" placeholder="请输入公司名称">
                </div>
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="login-username" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码">
                </div>
                <button type="submit" class="btn-login" id="login-btn">登 录</button>
                <div id="login-error" class="login-error"></div>
                <div class="login-toggle">
                    还没有账号？<a href="#" id="show-register">免费注册</a>
                </div>
            </form>

            <!-- Register Form -->
            <form id="register-form" style="display:none;" onsubmit="return false;">
                <div class="form-group">
                    <label>公司名称</label>
                    <input type="text" id="reg-company" placeholder="请输入公司名称">
                </div>
                <div class="form-row-2">
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" id="reg-realname" placeholder="管理员姓名">
                    </div>
                    <div class="form-group">
                        <label>手机号</label>
                        <input type="text" id="reg-phone" placeholder="联系手机号">
                    </div>
                </div>
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="reg-username" placeholder="登录用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="reg-password" placeholder="设置登录密码">
                </div>
                <button type="submit" class="btn-login" id="register-btn">免费注册（7天试用）</button>
                <div id="register-error" class="login-error"></div>
                <div class="login-toggle">
                    已有账号？<a href="#" id="show-login">返回登录</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="main-layout" style="display:none;">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">Au</div>
                <span class="sidebar-title">黄金分期</span>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <span class="nav-icon">📊</span><span class="nav-text">首页</span>
                </a>
                <a href="#" class="nav-item" data-page="customers">
                    <span class="nav-icon">👥</span><span class="nav-text">客户管理</span>
                </a>
                <a href="#" class="nav-item" data-page="orders">
                    <span class="nav-icon">📋</span><span class="nav-text">订单管理</span>
                </a>
                <a href="#" class="nav-item" data-page="repayments">
                    <span class="nav-icon">💰</span><span class="nav-text">还款计划</span>
                </a>
                <a href="#" class="nav-item" data-page="warehouse">
                    <span class="nav-icon">📦</span><span class="nav-text">入库管理</span>
                </a>
                <a href="#" class="nav-item" data-page="inventory">
                    <span class="nav-icon">🏷️</span><span class="nav-text">库存管理</span>
                </a>
                <a href="#" class="nav-item" data-page="appointments">
                    <span class="nav-icon">📅</span><span class="nav-text">预约管理</span>
                </a>
                <a href="#" class="nav-item" data-page="expenses">
                    <span class="nav-icon">💸</span><span class="nav-text">支出明细</span>
                </a>
                <a href="#" class="nav-item" data-page="overduePool">
                    <span class="nav-icon">🚨</span><span class="nav-text">逾期公共池</span>
                </a>
                <div class="nav-divider"></div>
                <a href="#" class="nav-item" data-page="team" id="nav-team" style="display:none;">
                    <span class="nav-icon">🏢</span><span class="nav-text">团队管理</span>
                </a>
                <a href="#" class="nav-item" data-page="subscription" id="nav-subscription" style="display:none;">
                    <span class="nav-icon">💎</span><span class="nav-text">订阅管理</span>
                </a>
                <div class="nav-divider"></div>
                <div class="sidebar-customer-widget" id="sidebar-customer-widget">
                    <div class="scw-title">客户信息一览表</div>
                    <div class="scw-body">
                        <div class="autocomplete-wrap" style="position:relative;">
                            <input type="text" id="overview-customer-input" class="scw-input" placeholder="输入客户姓名" autocomplete="off">
                            <input type="hidden" id="overview-customer-id">
                            <div class="autocomplete-dropdown" id="overview-customer-dropdown"></div>
                        </div>
                        <button class="scw-btn" id="btn-customer-overview">生成</button>
                    </div>
                </div>
                <div class="sidebar-commission-widget">
                    <div class="scw-title">提成计算器</div>
                    <div class="scw-body">
                        <input type="text" id="sc-name" class="scw-input" placeholder="客户经理或操作员姓名">
                        <div class="sc-date-row">
                            <input type="text" id="sc-date-from" class="scw-input sc-date-input" placeholder="起始" maxlength="10">
                            <span class="sc-date-sep">~</span>
                            <input type="text" id="sc-date-to" class="scw-input sc-date-input" placeholder="截止" maxlength="10">
                        </div>
                        <div class="sc-presets">
                            <button class="sc-preset-btn" data-preset="month">本月</button>
                            <button class="sc-preset-btn" data-preset="last-month">上月</button>
                            <button class="sc-preset-btn" data-preset="quarter">本季</button>
                            <button class="sc-preset-btn" data-preset="year">今年</button>
                            <button class="sc-preset-btn" data-preset="all">全部</button>
                        </div>
                        <button class="scw-btn" id="btn-sc-query">查询提成</button>
                        <div id="sc-result" style="display:none;"></div>
                    </div>
                </div>
                <div class="sidebar-service-widget">
                    <a href="#" class="nav-item" id="btn-online-service">
                        <span class="nav-icon">💬</span><span class="nav-text">在线客服</span>
                    </a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">管</div>
                    <span class="user-name" id="user-name">管理员</span>
                </div>
                <button class="btn-logout" id="btn-logout">退出</button>
            </div>
        </aside>

        <!-- Content -->
        <main class="content">
            <header class="topbar">
                <button class="menu-toggle" id="menu-toggle">☰</button>
                <h2 class="page-title" id="page-title">首页</h2>
                <div class="topbar-right">
                    <span class="tenant-name" id="topbar-tenant"></span>
                    <span class="date-display" id="date-display"></span>
                </div>
            </header>
            <!-- Trial Banner -->
            <div class="trial-banner" id="trial-banner" style="display:none;">
                <span id="trial-banner-text"></span>
            </div>
            <div class="page-content" id="page-content"></div>
        </main>
    </div>

    <!-- Company Info Overlay -->
    <div id="company-info-overlay">
        <div id="company-info-panel">
            <div class="ci-header">
                <span class="ci-title">信息维护</span>
                <button class="ci-close-btn" id="ci-close-btn">&times;</button>
            </div>
            <div class="ci-tabs" id="ci-tabs">
                <button class="ci-tab-btn active" data-tab="suppliers">供应商信息</button>
                <button class="ci-tab-btn" data-tab="staff">花名册</button>
                <button class="ci-tab-btn" data-tab="payments">收款账户</button>
                <button class="ci-tab-btn" data-tab="addresses">收货地址</button>
            </div>
            <div class="ci-body" id="ci-body"></div>
        </div>
    </div>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modal-overlay" style="display:none;">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modal-title">标题</h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="modal-cancel">取消</button>
                <button class="btn btn-primary" id="modal-confirm">确定</button>
            </div>
        </div>
    </div>

    <!-- Confirm Dialog -->
    <div class="modal-overlay" id="confirm-overlay" style="display:none;">
        <div class="modal confirm-modal">
            <div class="modal-header">
                <h3>确认操作</h3>
            </div>
            <div class="modal-body">
                <p id="confirm-message">确定执行此操作吗？</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="confirm-cancel">取消</button>
                <button class="btn btn-danger" id="confirm-ok">确定</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toast-container"></div>

    <script src="/static/js/api.js?v=113"></script>
    <script src="/static/js/dashboard.js?v=113"></script>
    <script src="/static/js/crud.js?v=113"></script>
    <script src="/static/js/app.js?v=113"></script>
</body>
</html>
